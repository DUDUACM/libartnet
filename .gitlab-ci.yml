stages:
  - build
  - release

variables:
  VERSION: ""

.build_linux: &build_linux
  image: ubuntu:22.04
  before_script:
    - apt-get update && apt-get install -y cmake gcc make
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - cmake -B build ${CMAKE_CROSS_FLAGS} -DBUILD_SHARED_LIBS=ON -DBUILD_EXAMPLES=OFF -DCMAKE_INSTALL_PREFIX=install
    - cmake --build build --config Release
    - cmake --install build --config Release --prefix install
    - PKGNAME="libartnet-${VERSION}-${PLATFORM}"
    - mv install "${PKGNAME}"
    - tar czf "${PKGNAME}.tar.gz" "${PKGNAME}"
  artifacts:
    paths:
      - libartnet-*.tar.gz
    expire_in: 1 day

.build_native: &build_native
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - cmake -B build -DBUILD_SHARED_LIBS=ON -DBUILD_EXAMPLES=OFF -DCMAKE_INSTALL_PREFIX=install
    - cmake --build build --config Release
    - cmake --install build --config Release --prefix install
    - VERSION="${CI_COMMIT_TAG#v}"
    - PKGNAME="libartnet-${VERSION}-${PLATFORM}"
    - mv install "${PKGNAME}"
    - |
      if [ "${PLATFORM}" = "windows-amd64" ]; then
        7z a "${PKGNAME}.zip" "${PKGNAME}"
      else
        tar czf "${PKGNAME}.tar.gz" "${PKGNAME}"
      fi
  artifacts:
    paths:
      - libartnet-*.zip
      - libartnet-*.tar.gz
    expire_in: 1 day

# ---- Linux amd64 ----
build:linux-amd64:
  <<: *build_linux
  stage: build
  variables:
    PLATFORM: "linux-amd64"
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---- Linux arm64 (cross-compile) ----
build:linux-arm64:
  <<: *build_linux
  stage: build
  variables:
    PLATFORM: "linux-arm64"
    CMAKE_CROSS_FLAGS: "-DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64 -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc"
  before_script:
    - apt-get update && apt-get install -y cmake gcc-aarch64-linux-gnu make
  rules:
    - if: $CI_COMMIT_TAG

# ---- Windows amd64 ----
build:windows-amd64:
  <<: *build_native
  stage: build
  variables:
    PLATFORM: "windows-amd64"
  before_script:
    - cmake --version
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---- macOS amd64 ----
build:macos-amd64:
  <<: *build_native
  stage: build
  variables:
    PLATFORM: "macos-amd64"
  before_script:
    - cmake --version
  rules:
    - if: $CI_COMMIT_TAG

# ---- Release ----
release:
  stage: release
  image: ubuntu:22.04
  needs:
    - build:linux-amd64
    - build:linux-arm64
    - build:windows-amd64
    - build:macos-amd64
  script:
    - ls -la libartnet-*
  release:
    tag_name: $CI_COMMIT_TAG
    name: "libartnet ${CI_COMMIT_TAG}"
    description: |
      libartnet ${CI_COMMIT_TAG} multi-platform release.
  artifacts:
    paths:
      - libartnet-*.zip
      - libartnet-*.tar.gz
    expire_in: never
  rules:
    - if: $CI_COMMIT_TAG

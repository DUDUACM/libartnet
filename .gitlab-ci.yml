stages:
  - build
  - release

image: ubuntu:22.04

# ---- Linux amd64 ----
build:linux-amd64:
  stage: build
  before_script:
    - apt-get update && apt-get install -y cmake gcc make
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - cmake -B build -DBUILD_SHARED_LIBS=ON -DBUILD_EXAMPLES=OFF -DCMAKE_INSTALL_PREFIX=install
    - cmake --build build --config Release
    - cmake --install build --config Release --prefix install
    - PKGNAME="libartnet-${VERSION}-linux-amd64"
    - mv install "${PKGNAME}"
    - tar czf "${PKGNAME}.tar.gz" "${PKGNAME}"
  artifacts:
    paths:
      - libartnet-*.tar.gz
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---- Windows amd64 (MinGW cross-compile) ----
build:windows-amd64:
  stage: build
  before_script:
    - apt-get update && apt-get install -y cmake make mingw-w64
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - >-
      cmake -B build
      -DCMAKE_SYSTEM_NAME=Windows
      -DCMAKE_SYSTEM_PROCESSOR=x86_64
      -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc
      -DBUILD_SHARED_LIBS=ON
      -DBUILD_EXAMPLES=OFF
      -DCMAKE_INSTALL_PREFIX=install
    - cmake --build build --config Release
    - cmake --install build --config Release --prefix install
    - PKGNAME="libartnet-${VERSION}-windows-amd64"
    - mv install "${PKGNAME}"
    - tar czf "${PKGNAME}.tar.gz" "${PKGNAME}"
  artifacts:
    paths:
      - libartnet-*.tar.gz
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---- Release ----
release:
  stage: release
  needs:
    - build:linux-amd64
    - build:windows-amd64
  script:
    - ls -la libartnet-*
  release:
    tag_name: $CI_COMMIT_TAG
    name: "libartnet ${CI_COMMIT_TAG}"
    description: |
      libartnet ${CI_COMMIT_TAG} multi-platform release.
  artifacts:
    paths:
      - libartnet-*.tar.gz
    expire_in: never
  rules:
    - if: $CI_COMMIT_TAG

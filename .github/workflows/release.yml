name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-amd64
            ext: zip
          - os: ubuntu-latest
            platform: linux-amd64
            ext: tar.gz
          - os: macos-15-intel
            platform: macos-amd64
            ext: tar.gz
          - os: macos-latest
            platform: macos-arm64
            ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Configure
        run: cmake -B build -DBUILD_SHARED_LIBS=ON -DBUILD_EXAMPLES=OFF -DCMAKE_INSTALL_PREFIX=install

      - name: Build
        run: cmake --build build --config Release

      - name: Install
        run: cmake --install build --config Release --prefix install

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          PKGNAME="libartnet-${VERSION}-${{ matrix.platform }}"
          cp -r install "${PKGNAME}"
          7z a "${PKGNAME}.zip" "${PKGNAME}"
          echo "ARTIFACT=${PKGNAME}.zip" >> $GITHUB_ENV

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          PKGNAME="libartnet-${VERSION}-${{ matrix.platform }}"
          cp -r install "${PKGNAME}"
          tar czf "${PKGNAME}.tar.gz" "${PKGNAME}"
          echo "ARTIFACT=${PKGNAME}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ${{ env.ARTIFACT }}

  cross-compile-linux-arm64:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install cross-compilation toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_EXAMPLES=OFF \
            -DCMAKE_INSTALL_PREFIX=install

      - name: Build
        run: cmake --build build --config Release

      - name: Install
        run: cmake --install build --config Release --prefix install

      - name: Package
        run: |
          PKGNAME="libartnet-${VERSION}-linux-arm64"
          cp -r install "${PKGNAME}"
          tar czf "${PKGNAME}.tar.gz" "${PKGNAME}"
          echo "ARTIFACT=${PKGNAME}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: ${{ env.ARTIFACT }}

  cross-compile-linux-armhf:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install cross-compilation toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=arm \
            -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_EXAMPLES=OFF \
            -DCMAKE_INSTALL_PREFIX=install

      - name: Build
        run: cmake --build build --config Release

      - name: Install
        run: cmake --install build --config Release --prefix install

      - name: Package
        run: |
          PKGNAME="libartnet-${VERSION}-linux-armhf"
          cp -r install "${PKGNAME}"
          tar czf "${PKGNAME}.tar.gz" "${PKGNAME}"
          echo "ARTIFACT=${PKGNAME}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-armhf
          path: ${{ env.ARTIFACT }}

  cross-compile-windows-arm64:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Configure
        run: cmake -B build -A ARM64 -DBUILD_SHARED_LIBS=ON -DBUILD_EXAMPLES=OFF -DCMAKE_INSTALL_PREFIX=install

      - name: Build
        run: cmake --build build --config Release

      - name: Install
        run: cmake --install build --config Release --prefix install

      - name: Package
        shell: bash
        run: |
          PKGNAME="libartnet-${VERSION}-windows-arm64"
          cp -r install "${PKGNAME}"
          7z a "${PKGNAME}.zip" "${PKGNAME}"
          echo "ARTIFACT=${PKGNAME}.zip" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: ${{ env.ARTIFACT }}

  create-release:
    needs: [build-and-release, cross-compile-linux-arm64, cross-compile-linux-armhf, cross-compile-windows-arm64]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: libartnet ${{ env.VERSION }}
          body: |
            ## libartnet ${{ env.VERSION }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows amd64 | `libartnet-${{ env.VERSION }}-windows-amd64.zip` |
            | Windows arm64 | `libartnet-${{ env.VERSION }}-windows-arm64.zip` |
            | Linux amd64 | `libartnet-${{ env.VERSION }}-linux-amd64.tar.gz` |
            | Linux arm64 | `libartnet-${{ env.VERSION }}-linux-arm64.tar.gz` |
            | Linux armhf | `libartnet-${{ env.VERSION }}-linux-armhf.tar.gz` |
            | macOS amd64 | `libartnet-${{ env.VERSION }}-macos-amd64.tar.gz` |
            | macOS arm64 | `libartnet-${{ env.VERSION }}-macos-arm64.tar.gz` |

            Each package contains:
            - Shared library (`.dll` / `.so` / `.dylib`)
            - Import library (`.lib` / linkable `.so`)
            - Public headers (`artnet/`)
            - CMake config files (`lib/cmake/libartnet/`)
            - pkg-config file (`lib/pkgconfig/libartnet.pc`)
          files: |
            artifacts/windows-amd64/*.zip
            artifacts/windows-arm64/*.zip
            artifacts/linux-amd64/*.tar.gz
            artifacts/linux-arm64/*.tar.gz
            artifacts/linux-armhf/*.tar.gz
            artifacts/macos-amd64/*.tar.gz
            artifacts/macos-arm64/*.tar.gz
          draft: false
          prerelease: false
